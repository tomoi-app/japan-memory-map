<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>あしあと - 地図を塗りつぶしていく旅行記録アプリ</title>
    <meta name="description" content="訪れた都道府県を地図に塗りつぶして旅行を記録するPWAアプリ。写真・日付・メモを残して、あなただけの旅の足跡を。">
    
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        /* iOS長押しによる写真プレビュー・コンテキストメニューを無効化 */
        .photo-grid-item,
        .photo-grid-item img,
        #thumb-wrap,
        #thumb-wrap img {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="あしあと">
    <meta name="theme-color" content="#f5f5f7">
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">

    <meta property="og:title" content="あしあと - 地図を塗りつぶしていく旅行記録アプリ">
    <meta property="og:description" content="訪れた都道府県を地図に塗りつぶして旅行を記録。写真・日付・メモを残して、あなただけの旅の足跡を。">
    <meta property="og:image" content="https://ashiato.tomoi-app.com/icon-512.png">
    <meta property="og:url" content="https://ashiato.tomoi-app.com">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="あしあと">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="あしあと - 地図を塗りつぶしていく旅行記録アプリ">
    <meta name="twitter:description" content="訪れた都道府県を地図に塗りつぶして旅行を記録。写真・日付・メモを残して、あなただけの旅の足跡を。">
    <meta name="twitter:image" content="https://ashiato.tomoi-app.com/icon-512.png">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JX9VPB7S9N"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-JX9VPB7S9N');
    </script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
            <h1 class="auth-title">あしあと</h1>
            <div id="auth-error" class="auth-error hidden"></div>
            <div id="auth-success" class="auth-success hidden"></div>

            <button onclick="handleGoogleLogin()" style="
                display: flex; align-items: center; justify-content: center; gap: 10px;
                width: 100%; padding: 13px;
                background: white; color: #444;
                border: 1.5px solid #d0dce6; border-radius: 10px;
                font-size: 0.95rem; font-weight: bold; font-family: inherit;
                cursor: pointer; transition: background 0.2s;
            " onmouseover="this.style.background='#f4f8fb'" onmouseout="this.style.background='white'">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
                Googleでログイン
            </button>

            <div style="display:flex; align-items:center; gap:10px; margin: 2px 0;">
                <div style="flex:1; height:1px; background:#eee;"></div>
                <span style="font-size:0.8rem; color:#ccc;">またはメールアドレスで</span>
                <div style="flex:1; height:1px; background:#eee;"></div>
            </div>

            <input type="email" id="auth-email" class="auth-input" placeholder="メールアドレス" autocomplete="email">
            <input type="password" id="auth-password" class="auth-input" placeholder="パスワード（6文字以上）" autocomplete="current-password">

            <button id="auth-submit-btn" class="auth-btn" onclick="handleAuth()">ログイン</button>

            <p class="auth-signup-link">アカウントの新規作成は<a href="#" onclick="switchToSignup(); return false;">こちら</a></p>
            <p class="auth-signup-link" id="forgot-pw-link"><a href="#" onclick="switchToReset(); return false;">パスワードをお忘れの方はこちら</a></p>

            <div style="display:flex; align-items:center; gap:10px; margin: 4px 0;">
                <div style="flex:1; height:1px; background:#eee;"></div>
                <span style="font-size:0.8rem; color:#ccc;">または</span>
                <div style="flex:1; height:1px; background:#eee;"></div>
            </div>

            <button onclick="startGuestMode()" style="
                padding: 13px;
                background: white;
                color: #6c8ca3;
                border: 1.5px solid #d0dce6;
                border-radius: 10px;
                font-size: 0.95rem;
                font-weight: bold;
                font-family: inherit;
                cursor: pointer;
                transition: background 0.2s;
            " onmouseover="this.style.background='#f4f8fb'" onmouseout="this.style.background='white'">
                ゲストとして試す
            </button>
            <p style="text-align:center; font-size:0.78rem; color:#bbb; margin: -4px 0 0 0;">
                登録なしで試せます。後からデータを引き継げます。
            </p>

            <div id="privacy-agree-wrap" style="display:none; align-items:flex-start; gap:10px; padding:4px 0;">
                <input type="checkbox" id="privacy-agree-check"
                    onchange="document.getElementById('auth-submit-btn').disabled = !this.checked;"
                    style="margin-top:3px; width:18px; height:18px; accent-color:#6c8ca3; flex-shrink:0; cursor:pointer;">
                <label for="privacy-agree-check" style="font-size:0.85rem; color:#888; line-height:1.6; cursor:pointer;">
                    <a href="/privacy.html" target="_blank" style="color:#6c8ca3; font-weight:bold;">プライバシーポリシー</a>および<a href="/privacy.html#terms" target="_blank" style="color:#6c8ca3; font-weight:bold;">利用規約</a>に同意する
                </label>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden">
    <div class="main-layout">
        <div class="map-section">
            <div id="map-container"></div>
            <div id="pref-counter">0 / 47</div>

            <div id="admin-icon" style="
                position: absolute;
                top: 15px;
                left: 15px;
                z-index: 1000;
                width: 48px;
                height: 48px;
                border-radius: 50%;
                overflow: hidden;
                box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                background: white;
                border: 2px solid white;
            ">
                <img src="icon-tomoi.png" alt="ともい" style="width:100%; height:100%; object-fit:cover; display:block;">
            </div>
            
            <button id="menu-btn" title="一覧">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>

            <button id="settings-btn" class="settings-btn" title="設定">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="#555"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </button>


            </div>

        <div id="right-panel" class="list-section">
        </div>

        <div id="settings-panel" class="list-section">
        </div>
    </div>
    </div>

    <div id="slider-modal" class="modal hidden">
        <button id="btn-close-slider" class="modal-close-btn">✕</button>
        <div class="modal-content">
            <img id="slide-image" src="">
            <div class="slide-controls">
                <button id="btn-prev">←</button>
                <span id="slide-counter"></span>
                <button id="btn-next">→</button>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">地図を読み込み中...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
