<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思い出マップ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Streamlitのレイアウトを再現するCSS */
        body { margin: 0; font-family: sans-serif; }
        #app-container { display: flex; height: 100vh; width: 100vw; }
        #map-section { flex: 2; position: relative; }
        #map-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
        #right-panel { flex: 1; transition: background-color 0.5s ease; padding: 25px; overflow-y: auto; background-color: white; }
        
        /* スライドモーダル */
        #slider-modal, #home-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; }
        #slider-modal.show, #home-modal.show { display: flex; }
        .modal-box { background: white; padding: 20px; border-radius: 10px; width: 80%; max-width: 600px; text-align: center; }
        .slide-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .slide-controls button { font-size: 2rem; padding: 10px 20px; cursor: pointer; }
        #slide-image { max-width: 100%; max-height: 60vh; object-fit: contain; }
        
        /* ボタン等の装飾 */
        button { cursor: pointer; border-radius: 8px; border: 1px solid #ccc; padding: 10px; background: white; }
        .primary-btn { background: #fff; color: #333; border: 2px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,.1); font-size: 1.5rem; padding: 15px; font-weight: bold; width: 100%; margin-top: 10px; }
        .tertiary-btn { text-align: left; width: 100%; padding: 15px; font-size: 1.5rem; margin-bottom: 10px; border: none; background: #f8f9fa; }
        .tertiary-btn:hover { background: #e9ecef; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="map-section"><div id="map-container"></div></div>
        <div id="right-panel"></div>
    </div>

    <div id="slider-modal">
        <div class="modal-box">
            <img id="slide-image" src="" alt="slide">
            <div class="slide-controls">
                <button id="btn-prev">←</button>
                <h3 id="slide-counter">1 / 1</h3>
                <button id="btn-next">→</button>
            </div>
            <button onclick="document.getElementById('slider-modal').classList.remove('show')" style="margin-top: 15px; width: 100%;">閉じる</button>
        </div>
    </div>

    <div id="home-modal">
        <div class="modal-box">
            <h2>家を登録する</h2>
            <p>※現在はダミー表示です。後ほどデータベースと連携します。</p>
            <button onclick="document.getElementById('home-modal').classList.remove('show')" class="primary-btn">閉じる</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
