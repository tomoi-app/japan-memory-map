<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>思い出マップ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="main-layout">
        <div class="map-section">
            <div id="map-container"></div>
            <button id="menu-btn">☰</button>
            <div id="pref-counter">0 / 47</div>

            <div id="slider-modal" class="modal hidden">
                <div class="modal-content">
                    <img id="slide-image" src="">
                    <div class="slide-controls">
                        <button id="btn-prev">前へ</button>
                        <span id="slide-counter">1 / 1</span>
                        <button id="btn-next">次へ</button>
                    </div>
                    <button id="btn-close-slider" class="btn-full">閉じる</button>
                </div>
            </div>
        </div>

        <div id="right-panel" class="list-section"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
