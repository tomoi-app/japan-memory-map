<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>あしあと</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="あしあと">
    <meta name="theme-color" content="#f5f5f7">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
            <h1 class="auth-title">あしあと</h1>
            <div id="auth-error" class="auth-error hidden"></div>
            <div id="auth-success" class="auth-success hidden"></div>

            <input type="email" id="auth-email" class="auth-input" placeholder="メールアドレス" autocomplete="email">
            <input type="password" id="auth-password" class="auth-input" placeholder="パスワード（6文字以上）" autocomplete="current-password">

            <button id="auth-submit-btn" class="auth-btn" onclick="handleAuth()">ログイン</button>

            <p class="auth-signup-link">アカウントの新規作成は<a href="#" onclick="switchToSignup(); return false;">こちら</a></p>
            <p class="auth-signup-link" id="forgot-pw-link"><a href="#" onclick="switchToReset(); return false;">パスワードをお忘れの方はこちら</a></p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
    <div class="main-layout">
        <div class="map-section">
            <div id="map-container"></div>
            <div id="pref-counter">0 / 47</div>
            
            <button id="menu-btn" title="一覧">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>

            <button id="settings-btn" title="設定">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>

        <div id="right-panel" class="list-section">
        </div>

        <div id="settings-panel" class="settings-section hidden">
        </div>
    </div>
    </div>

    <div id="slider-modal" class="modal hidden">
        <button id="btn-close-slider" class="modal-close-btn">✕</button>
        <div class="modal-content">
            <img id="slide-image" src="">
            <div class="slide-controls">
                <button id="btn-prev">←</button>
                <span id="slide-counter"></span>
                <button id="btn-next">→</button>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <div class="loading-text">処理中...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
